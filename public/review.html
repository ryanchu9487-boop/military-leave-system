<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartMil - 출타 심의 (검토)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
      body {
        font-family: "Pretendard", sans-serif;
      }
      .mesh-bg {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: -1; overflow: hidden; background-color: #f8fafc; transition: background-color 0.5s ease;
      }
      .blob {
        position: absolute; filter: blur(80px); opacity: 0.6;
        animation: float 10s infinite alternate ease-in-out; transition: background 0.5s ease;
      }
      .blob-1 {
        top: -10%; left: -10%; width: 50vw; height: 50vw;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, rgba(99, 102, 241, 0) 70%);
      }
      .blob-2 {
        bottom: -20%; right: -10%; width: 60vw; height: 60vw;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, rgba(59, 130, 246, 0) 70%);
        animation-delay: -5s;
      }
      .cancel-mode .mesh-bg { background-color: #fffaf5; }
      .cancel-mode .blob-1 { background: radial-gradient(circle, rgba(249, 115, 22, 0.3) 0%, rgba(249, 115, 22, 0) 70%); }
      .cancel-mode .blob-2 { background: radial-gradient(circle, rgba(239, 68, 68, 0.25) 0%, rgba(239, 68, 68, 0) 70%); }
      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, 50px) scale(1.1); }
      }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .glass-card { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(20px) scale(0.98); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
    </style>
  </head>
  <body class="text-slate-800 min-h-screen flex items-center justify-center p-4 sm:p-8 relative selection:bg-indigo-500 selection:text-white" id="mainBody">
    <div class="mesh-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div class="glass-card max-w-2xl w-full bg-white/70 backdrop-blur-2xl border border-white/60 shadow-[0_24px_60px_-15px_rgba(0,0,0,0.1)] rounded-[2.5rem] p-8 sm:p-10 relative overflow-hidden">
      <button onclick="window.location.href='index.html'" class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center rounded-full bg-gray-100/50 hover:bg-gray-200 text-gray-400 transition-all z-20">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>

      <div class="mb-8">
        <div id="statusBadge" class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-100/50 border border-indigo-200 text-indigo-700 text-xs font-bold tracking-wider mb-4 shadow-sm transition-colors">
          <i class="fa-solid fa-file-signature"></i>
          <span id="unitNameDisplay">소속부대</span>
        </div>
        <h1 class="text-3xl font-black tracking-tight text-gray-900" id="mainTitle">
          출타 심의 <span class="text-indigo-600 font-light" id="subTitle">검토</span>
        </h1>
      </div>

      <div id="loading" class="text-center py-20">
        <div class="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4" id="loadingSpinner"></div>
      </div>

      <div id="leave-content" class="hidden space-y-8">
        <div class="flex items-center gap-5 p-5 rounded-3xl bg-white/50 border border-white shadow-sm">
          <div id="userAvatar" class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-indigo-500 to-blue-500 shadow-lg shadow-indigo-500/30 flex items-center justify-center text-white text-2xl font-black transition-colors">
            <span id="userInitial">U</span>
          </div>
          <div>
            <p class="text-sm font-bold text-indigo-600 mb-0.5 transition-colors" id="userRank">계급</p>
            <h2 class="text-2xl font-black text-gray-800 tracking-tight leading-none" id="userName">이름</h2>
            <p class="text-sm text-gray-500 font-mono mt-1" id="serviceNumber">군번</p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div id="aiAssistPanel" class="col-span-2 p-4 rounded-2xl border shadow-sm transition-colors hidden">
            <div class="flex items-center justify-between mb-1.5">
              <span class="text-xs font-bold uppercase tracking-wider flex items-center gap-1.5" id="aiAssistTitle">
                <i class="fa-solid fa-robot"></i> AI 심의 보조
              </span>
              <span class="text-[10px] font-bold px-2 py-0.5 rounded-full" id="aiScoreBadge"></span>
            </div>
            <p id="aiAssistMessage" class="font-medium text-sm text-gray-700"></p>
          </div>

          <div class="p-5 rounded-3xl bg-white/40 border border-white/80 shadow-sm flex flex-col justify-center">
            <span class="text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">출타 기간</span>
            <strong id="leaveDates" class="text-lg font-bold text-gray-800"></strong>
          </div>
          <div id="daysBox" class="p-5 rounded-3xl bg-indigo-50/50 border border-indigo-100/50 flex flex-col justify-center items-end text-right transition-colors">
            <span id="daysLabel" class="text-xs font-bold text-indigo-400 mb-1 uppercase tracking-wider transition-colors">사용/취소 일수</span>
            <div class="flex items-baseline gap-1">
              <strong id="totalDays" class="text-3xl font-black text-indigo-600 transition-colors"></strong>
              <span id="daysUnit" class="text-sm font-bold text-indigo-400 transition-colors">일</span>
            </div>
          </div>
          <div class="col-span-2 p-5 rounded-3xl bg-white/40 border border-white/80 shadow-sm">
            <span class="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider block">상세 사유 / 행선지</span>
            <p id="leaveReason" class="text-gray-700 font-medium leading-relaxed"></p>
          </div>

          <div id="evidenceSection" class="col-span-2 p-5 rounded-3xl bg-slate-50 border border-slate-100 shadow-sm hidden transition-colors">
            <span class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider flex items-center gap-1.5">
              <i class="fa-solid fa-paperclip"></i> 첨부된 증빙 서류
            </span>
            <div id="evidenceFilesContainer" class="flex flex-wrap gap-2"></div>
          </div>
        </div>

        <div class="mt-6 border-t border-gray-100 pt-5">
          <h4 class="text-sm font-black text-gray-800 mb-3 flex items-center gap-2">
            <i class="fa-solid fa-clock-rotate-left text-indigo-500"></i> 신청일 기준 최근 출타 기록
            <span class="text-[10px] font-medium text-gray-400 font-mono bg-gray-100 px-1.5 py-0.5 rounded" id="historyBaseDateBadge"></span>
          </h4>
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3" id="historyCardsContainer">
            <div class="bg-emerald-50/50 border border-emerald-100 rounded-xl p-3">
              <div class="flex items-center gap-1.5 mb-2 border-b border-emerald-100 pb-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                <span class="text-xs font-bold text-emerald-800">외출 (최근 3건)</span>
              </div>
              <div id="historyOuting" class="space-y-2 text-xs text-gray-600">
                <div class="flex items-center justify-center py-2"><span class="loading loading-spinner loading-xs text-emerald-300"></span></div>
              </div>
            </div>
            <div class="bg-blue-50/50 border border-blue-100 rounded-xl p-3">
              <div class="flex items-center gap-1.5 mb-2 border-b border-blue-100 pb-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                <span class="text-xs font-bold text-blue-800">외박 (최근 3건)</span>
              </div>
              <div id="historyOvernight" class="space-y-2 text-xs text-gray-600">
                <div class="flex items-center justify-center py-2"><span class="loading loading-spinner loading-xs text-blue-300"></span></div>
              </div>
            </div>
            <div class="bg-purple-50/50 border border-purple-100 rounded-xl p-3">
              <div class="flex items-center gap-1.5 mb-2 border-b border-purple-100 pb-2">
                <span class="w-2 h-2 rounded-full bg-purple-500"></span>
                <span class="text-xs font-bold text-purple-800">휴가 (최근 3건)</span>
              </div>
              <div id="historyVacation" class="space-y-2 text-xs text-gray-600">
                <div class="flex items-center justify-center py-2"><span class="loading loading-spinner loading-xs text-purple-300"></span></div>
              </div>
            </div>
          </div>
        </div>

        <div class="flex gap-3 pt-4 border-t border-gray-100/50">
          <button id="rejectBtn" onclick="rejectLeave()" class="flex-1 py-4 rounded-2xl bg-white text-red-500 font-bold text-base border border-gray-100 shadow-sm hover:bg-red-50 transition-all">
            거절
          </button>
          <button id="approveBtn" onclick="submitReview()" class="flex-[2] py-4 rounded-2xl bg-gray-900 text-white font-bold text-base shadow-xl shadow-gray-900/20 hover:bg-indigo-600 transition-all flex justify-center items-center gap-2">
            <i class="fa-solid fa-check" id="approveIcon"></i>
            <span id="approveText">검토 완료</span>
          </button>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("token");
      const urlParams = new URLSearchParams(window.location.search);
      const leaveId = urlParams.get("id");
      let isCancelRequest = false;

      if (!token || !leaveId) {
        alert("잘못된 접근입니다.");
        window.location.href = "index.html";
      }

      function getCurrentRank(user) {
        if (!user) return "계급 미상";
        if (user.role !== "soldier" || !user.promoToIlbyung) return user.rank || "계급 미상";
        const today = new Date();
        const toIlbyung = new Date(user.promoToIlbyung);
        const toSangbyung = new Date(user.promoToSangbyung);
        const toByungjang = new Date(user.promoToByungjang);
        if (today >= toByungjang) return "병장";
        if (today >= toSangbyung) return "상병";
        if (today >= toIlbyung) return "일병";
        return "이병";
      }

      function applyCancelModeUI() {
        document.getElementById("mainBody").classList.add("cancel-mode", "selection:bg-orange-500");
        document.getElementById("mainBody").classList.remove("selection:bg-indigo-500");
        document.getElementById("statusBadge").className = "inline-flex items-center gap-2 px-3 py-1 rounded-full bg-orange-100/50 border border-orange-200 text-orange-700 text-xs font-bold tracking-wider mb-4 shadow-sm transition-colors";
        document.getElementById("mainTitle").innerHTML = `휴가 취소 <span class="text-orange-600 font-light">검토 결재</span>`;
        document.getElementById("userAvatar").className = "w-16 h-16 rounded-2xl bg-gradient-to-tr from-orange-500 to-red-400 shadow-lg shadow-orange-500/30 flex items-center justify-center text-white text-2xl font-black transition-colors";
        document.getElementById("userRank").className = "text-sm font-bold text-orange-600 mb-0.5 transition-colors";
        document.getElementById("daysBox").className = "p-5 rounded-3xl bg-orange-50/50 border border-orange-100/50 flex flex-col justify-center items-end text-right transition-colors";
        document.getElementById("daysLabel").className = "text-xs font-bold text-orange-500 mb-1 uppercase tracking-wider transition-colors";
        document.getElementById("totalDays").className = "text-3xl font-black text-orange-600 transition-colors";
        document.getElementById("daysUnit").className = "text-sm font-bold text-orange-500 transition-colors";
        document.getElementById("rejectBtn").innerHTML = "취소 거절 (휴가유지)";
        document.getElementById("rejectBtn").className = "flex-1 py-4 rounded-2xl bg-white text-gray-500 font-bold text-sm border border-gray-200 shadow-sm hover:bg-gray-50 transition-all";
        document.getElementById("approveBtn").className = "flex-[2] py-4 rounded-2xl bg-orange-600 text-white font-bold text-base shadow-xl shadow-orange-600/20 hover:bg-orange-700 transition-all flex justify-center items-center gap-2";
        document.getElementById("approveText").innerText = "취소 결재 완료 (승인자로 전달)";
        document.getElementById("approveIcon").className = "fa-solid fa-file-excel";
        document.getElementById("evidenceSection").classList.replace("bg-slate-50", "bg-orange-50/50");
        document.getElementById("evidenceSection").classList.replace("border-slate-100", "border-orange-100/50");
      }

      async function fetchLeaveDetails() {
        try {
          document.getElementById("unitNameDisplay").innerText = localStorage.getItem("unitName") || "소속부대";
          const res = await fetch("/notifications", { headers: { Authorization: `Bearer ${token}` } });
          const data = await res.json();
          const leave = data.notifications.find((l) => l._id === leaveId);
          if (!leave) return (window.location.href = "index.html");

          if (leave.status === "CANCEL_REQ_REVIEW") {
            isCancelRequest = true;
            applyCancelModeUI();
          }

          const name = leave.userId.name || "알수없음";
          document.getElementById("userInitial").innerText = name.charAt(0);
          document.getElementById("userRank").innerText = getCurrentRank(leave.userId);
          document.getElementById("userName").innerText = name;
          document.getElementById("serviceNumber").innerText = leave.userId.serviceNumber;

          const startDateOnly = leave.startDate.split("T")[0];
          const endDateOnly = leave.endDate.split("T")[0];
          document.getElementById("leaveDates").innerText = `${startDateOnly.replace(/-/g, ".")} ~ ${endDateOnly.replace(/-/g, ".")}`;
          document.getElementById("totalDays").innerText = leave.totalDaysUsed;
          document.getElementById("leaveReason").innerText = leave.reason;

          // 🔥 AI 보조 시스템 렌더링
          if (!isCancelRequest) {
            const aiPanel = document.getElementById("aiAssistPanel");
            const aiTitle = document.getElementById("aiAssistTitle");
            const aiMsg = document.getElementById("aiAssistMessage");
            const aiScore = document.getElementById("aiScoreBadge");
            aiPanel.classList.remove("hidden");

            if (leave.isWaitlisted) {
              aiPanel.className = "col-span-2 p-5 rounded-2xl border shadow-sm transition-colors bg-orange-50 border-orange-200";
              aiTitle.className = "text-xs font-black uppercase tracking-wider flex items-center gap-1.5 text-orange-600";
              aiScore.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-orange-200 text-orange-800";
              aiScore.innerText = `우선순위: ${leave.priorityScore || 0}점`;
              aiMsg.className = "font-medium text-sm mt-1 text-orange-800 leading-snug";
              aiMsg.innerHTML = "⚠️ <strong>[출타율 초과 - 후보]</strong> 시스템 계산 결과, 해당 일자의 출타율 정원이 초과되었습니다. 부대 전투력 유지를 위해 <strong>반려를 권장</strong>합니다.";
            } else if (leave.isManualOverride) {
              aiPanel.className = "col-span-2 p-5 rounded-2xl border shadow-sm transition-colors bg-blue-50 border-blue-200";
              aiTitle.className = "text-xs font-black uppercase tracking-wider flex items-center gap-1.5 text-blue-600";
              aiScore.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-blue-200 text-blue-800";
              aiScore.innerText = `우선순위: ${leave.priorityScore || 0}점 (수동 고정)`;
              aiMsg.className = "font-medium text-sm mt-1 text-blue-800 leading-snug";
              aiMsg.innerHTML = "🔒 <strong>[관리자 수동 고정]</strong> 달력에서 관리자가 정규 편성에 강제로 고정한 인원입니다. <strong>승인을 권장</strong>합니다.";
            } else {
              aiPanel.className = "col-span-2 p-5 rounded-2xl border shadow-sm transition-colors bg-emerald-50 border-emerald-200";
              aiTitle.className = "text-xs font-black uppercase tracking-wider flex items-center gap-1.5 text-emerald-600";
              aiScore.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-emerald-200 text-emerald-800";
              aiScore.innerText = `우선순위: ${leave.priorityScore || 0}점`;
              aiMsg.className = "font-medium text-sm mt-1 text-emerald-800 leading-snug";
              aiMsg.innerHTML = "✅ <strong>[정규 편성]</strong> 출타율 정원 내에 안전하게 편성되었습니다. <strong>검토완료(승인)를 권장</strong>합니다.";
            }
          }

          const evidenceSection = document.getElementById("evidenceSection");
          const evidenceContainer = document.getElementById("evidenceFilesContainer");
          evidenceContainer.innerHTML = "";
          let hasFiles = false;

          const createBtn = (url, name) => `
            <a href="${url}" target="_blank" class="inline-flex items-center gap-2 px-3 py-2 bg-white border border-gray-200 rounded-xl shadow-sm hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition-all text-xs font-bold text-gray-700">
              <i class="fa-solid fa-file-arrow-down text-indigo-500"></i> ${name}
            </a>
          `;

          if (leave.evidenceFiles && leave.evidenceFiles.length > 0) {
            hasFiles = true;
            leave.evidenceFiles.forEach((fileUrl, index) => {
              evidenceContainer.innerHTML += createBtn(fileUrl, `증빙 서류 #${index + 1}`);
            });
          }

          if (hasFiles) evidenceSection.classList.remove("hidden");
          document.getElementById("loading").classList.add("hidden");
          document.getElementById("leave-content").classList.remove("hidden");

          loadLeaveHistory(leave.userId._id, startDateOnly);
        } catch (err) {}
      }

      async function loadLeaveHistory(userId, requestedStartDate) {
        const badge = document.getElementById("historyBaseDateBadge");
        if(badge) badge.innerText = `기준: ${requestedStartDate} 이전`;
        try {
          const res = await fetch(`/leaves/user-history/${userId}?beforeDate=${requestedStartDate}`, { headers: { Authorization: `Bearer ${token}` } });
          const data = await res.json();
          if (data.success) {
            const renderList = (elementId, records) => {
              const el = document.getElementById(elementId);
              if (!el) return;
              if (records.length === 0) {
                el.innerHTML = `<div class="text-center text-gray-400 py-1 font-medium">기록 없음</div>`;
                return;
              }
              el.innerHTML = records.map(record => {
                const sDate = new Date(record.startDate);
                const eDate = new Date(record.endDate);
                const dateStr = `${sDate.getMonth()+1}/${sDate.getDate()} - ${eDate.getMonth()+1}/${eDate.getDate()}`;
                let daysAgoBadge = "";
                if (record.daysAgo > 30) {
                  daysAgoBadge = `<span class="text-[9px] font-bold text-red-500 ml-1 bg-red-50 px-1 rounded">${record.daysAgo}일 전</span>`;
                }
                return `
                  <div class="flex flex-col bg-white p-2 rounded-lg border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-center mb-0.5">
                      <span class="font-bold text-gray-800 font-mono">${dateStr}</span>
                      ${daysAgoBadge}
                    </div>
                    <span class="truncate text-gray-500 opacity-80" title="${record.reason}">${record.reason}</span>
                  </div>
                `;
              }).join("");
            };
            renderList("historyOuting", data.history["외출"]);
            renderList("historyOvernight", data.history["외박"]);
            renderList("historyVacation", data.history["휴가"]);
          }
        } catch (error) {}
      }

      async function rejectLeave() {
        const msg = isCancelRequest ? "취소 신청을 반려하시겠습니까?\n(기존 휴가가 그대로 유지됩니다.)" : "이 신청을 거절하시겠습니까?\n(일수가 반환됩니다.)";
        if (!confirm(msg)) return;
        try {
          const res = await fetch(`/leaves/${leaveId}/reject`, { method: "PUT", headers: { Authorization: `Bearer ${token}` } });
          if ((await res.json()).success) window.location.href = "index.html";
        } catch (err) {}
      }

      async function submitReview() {
        const msg = isCancelRequest ? "휴가 취소 결재를 완료하시겠습니까?\n(최종 승인자에게 전달됩니다.)" : "검토 완료하시겠습니까?\n(최종 승인자에게 전달됩니다.)";
        if (!confirm(msg)) return;
        try {
          const res = await fetch(`/leaves/${leaveId}/review`, { method: "PUT", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" } });
          if ((await res.json()).success) window.location.href = "index.html";
        } catch (err) {}
      }
      
      fetchLeaveDetails();
    </script>
  </body>
</html>
