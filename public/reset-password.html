<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>비밀번호 재설정</title>
  </head>
  <body>
    <h2>비밀번호 재설정</h2>
    <p>새 비밀번호를 입력하십시오：</p>

    <input
      type="password"
      id="newPassword"
      placeholder="새 비밀번호 (최소 6글자)"
    /><br /><br />
    <button id="resetBtn">비밀번호 재설정</button>
    <p id="message" style="color: red"></p>

    <p>
      <a href="/login.html">로그인 페이지로 돌아가기.</a>
    </p>

    <script>
      document
        .getElementById("resetBtn")
        .addEventListener("click", async () => {
          const newPassword = document
            .getElementById("newPassword")
            .value.trim();
          const messageEl = document.getElementById("message");
          messageEl.style.color = "red";
          messageEl.textContent = "";

          if (!newPassword || newPassword.length < 6) {
            messageEl.textContent = "새 비밀번호는 최소 6글자입니다.";
            return;
          }

          // 從 URL 取得 token
          const token = window.location.pathname.split("/").pop();

          try {
            const res = await fetch(
              `${window.location.origin}/reset-password/${token}`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ newPassword }),
              }
            );

            const data = await res.json();

            if (res.ok) {
              messageEl.style.color = "green";
              messageEl.textContent =
                data.message || "비밀번호가 성공적으로 재설정되었습니다.";
            } else {
              messageEl.textContent = data.message || data.error || "오류 발생";
            }
          } catch (err) {
            console.error(err);
            messageEl.textContent =
              "서버 오류입니다. 잠시 후에 다시 시도하십시오.";
          }
        });
    </script>
  </body>
</html>
