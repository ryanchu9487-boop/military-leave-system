<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartMil - 계정 설정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
      body {
        font-family: "Pretendard", sans-serif;
      }

      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        background-color: #f8fafc;
      }
      .blob {
        position: absolute;
        filter: blur(90px);
        opacity: 0.65;
        animation: float 12s infinite alternate ease-in-out;
      }
      .blob-1 {
        top: -10%;
        left: -10%;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.3) 0%,
          rgba(99, 102, 241, 0) 70%
        );
      }
      .blob-2 {
        bottom: -20%;
        right: -10%;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(
          circle,
          rgba(168, 85, 247, 0.2) 0%,
          rgba(168, 85, 247, 0) 70%
        );
        animation-delay: -5s;
      }
      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(30px, 50px) scale(1.1);
        }
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        border-radius: 1.5rem;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-slate-800 overflow-hidden h-screen flex flex-col relative selection:bg-indigo-500 selection:text-white"
  >
    <div class="mesh-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div
      id="sidebarOverlay"
      onclick="closeSidebar()"
      class="fixed inset-0 bg-black/50 z-[80] hidden transition-opacity duration-300 opacity-0"
    ></div>

    <aside
      id="sidebar"
      class="fixed top-0 left-0 h-full w-64 bg-white z-[90] shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col"
    >
      <div
        class="p-6 border-b border-gray-100 flex justify-between items-center bg-indigo-50"
      >
        <h2
          class="text-xl font-bold text-indigo-700 leading-none tracking-tight"
        >
          SmartMil
        </h2>
        <button
          onclick="closeSidebar()"
          class="text-gray-500 hover:text-gray-800 transition"
        >
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <a
          href="index.html"
          class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-50 text-gray-700 hover:text-indigo-700 transition group"
        >
          <i
            class="fa-solid fa-calendar-days text-lg text-gray-400 group-hover:text-indigo-600"
          ></i
          ><span class="font-medium">홈 (달력)</span>
        </a>
        <a
          id="manageTeamSidebarBtn"
          href="adduser.html"
          class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-50 text-gray-700 hover:text-indigo-700 transition group hidden"
        >
          <i
            class="fa-solid fa-user-plus text-lg text-gray-400 group-hover:text-indigo-600"
          ></i
          ><span class="font-medium">부대원 관리 (인원 추가)</span>
        </a>
      </nav>
    </aside>

    <header
      class="bg-white/75 backdrop-blur-2xl border-b border-gray-100 px-4 sm:px-6 py-3 flex items-center justify-between relative z-40 transition-all shrink-0"
    >
      <div class="flex items-center gap-3">
        <button
          onclick="openSidebar()"
          class="text-gray-500 hover:text-gray-800 transition p-2 rounded-full hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500/20"
        >
          <i class="fa-solid fa-bars text-lg"></i>
        </button>
        <h1
          onclick="window.location.href='index.html'"
          class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 tracking-tighter cursor-pointer hover:opacity-80 transition-opacity"
        >
          SmartMil
        </h1>
      </div>

      <div class="flex items-center gap-2 sm:gap-3">
        <div class="relative group hidden sm:flex items-center">
          <input
            type="text"
            placeholder="검색..."
            class="w-9 h-9 rounded-full bg-gray-100/80 border border-transparent focus:w-40 sm:focus:w-56 focus:bg-white focus:border-gray-200 focus:shadow-[0_4px_20px_-5px_rgba(0,0,0,0.1)] focus:px-4 focus:pl-10 transition-all duration-500 outline-none text-sm placeholder-transparent focus:placeholder-gray-400 cursor-pointer focus:cursor-text peer text-gray-700"
          />
          <i
            class="fa-solid fa-magnifying-glass absolute left-2.5 text-gray-500 peer-focus:text-indigo-500 transition-colors duration-300 pointer-events-none"
          ></i>
        </div>

        <span
          id="user-profile-name"
          class="text-sm font-bold text-gray-700 hidden sm:block"
          >로딩중...</span
        >

        <div class="relative flex items-center">
          <button
            id="notificationWrapper"
            onclick="toggleNotifications()"
            class="w-9 h-9 relative flex items-center justify-center text-gray-600 hover:text-indigo-600 hover:bg-gray-100 rounded-full transition-all focus:outline-none hidden"
            title="알림"
          >
            <i class="fa-regular fa-bell text-lg"></i>
            <span
              id="notificationBadge"
              class="hidden absolute top-2 right-2.5 w-2 h-2 bg-red-500 rounded-full border border-white"
            ></span>
          </button>
          <div
            id="notificationDropdown"
            class="hidden absolute top-12 right-0 w-80 sm:w-96 bg-white shadow-[0_10px_40px_rgba(0,0,0,0.1)] rounded-xl border border-gray-100 z-50 flex flex-col max-h-96 overflow-hidden transition-all transform origin-top-right"
          >
            <div
              class="p-3 border-b border-gray-100 bg-gray-50/80 backdrop-blur-sm font-bold text-gray-800 text-sm flex justify-between items-center"
            >
              <span
                ><i class="fa-solid fa-bell text-indigo-500 mr-1.5"></i>알림
                내역</span
              >
              <div class="flex items-center gap-2">
                <button
                  id="approveAllBtn"
                  onclick="approveAllLeaves()"
                  class="hidden text-[11px] bg-indigo-600 text-white px-2.5 py-1 rounded shadow-sm hover:bg-indigo-700 transition font-bold"
                >
                  일괄 승인
                </button>
                <button
                  onclick="toggleNotifications()"
                  class="text-gray-400 hover:text-gray-600"
                >
                  <i class="fa-solid fa-xmark"></i>
                </button>
              </div>
            </div>
            <div
              id="notificationList"
              class="flex flex-col overflow-y-auto custom-scrollbar bg-white"
            ></div>
          </div>
        </div>

        <div class="hidden sm:block w-px h-5 bg-gray-300 mx-1"></div>

        <button
          onclick="window.location.href='settings.html'"
          class="w-9 h-9 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 text-white flex items-center justify-center font-bold shadow-sm hover:shadow-md hover:scale-105 transition-all focus:outline-none"
          title="내 정보 및 설정"
        >
          <span class="text-xs" id="headerProfileInitials">U</span>
        </button>

        <button
          onclick="logout()"
          class="w-9 h-9 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-all focus:outline-none"
          title="로그아웃"
        >
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto custom-scrollbar w-full relative z-10">
      <div class="max-w-3xl mx-auto pt-8 px-4 sm:px-6 pb-20 space-y-6">
        <section
          class="glass-card p-6 sm:p-8 flex items-center gap-6 relative overflow-hidden"
        >
          <div
            class="absolute -right-6 -top-6 w-32 h-32 bg-indigo-50 rounded-full blur-2xl opacity-60 pointer-events-none"
          ></div>
          <div
            class="w-20 h-20 sm:w-24 sm:h-24 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full flex items-center justify-center text-white text-3xl font-black shadow-lg shrink-0"
            id="profileInitial"
          >
            U
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span
                id="profileRank"
                class="px-2.5 py-1 bg-indigo-100 text-indigo-700 rounded-md text-xs font-black shadow-sm"
                >계급</span
              >
              <span
                id="profileRole"
                class="text-[11px] font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-md border border-gray-200"
                >역할</span
              >
            </div>
            <h2
              id="profileName"
              class="text-2xl sm:text-3xl font-black text-gray-900 tracking-tight"
            >
              이름 불러오는 중...
            </h2>
            <p class="text-sm font-mono text-gray-500 mt-1">
              <i class="fa-solid fa-id-badge mr-1.5"></i
              ><span id="profileServiceNum">00-00000000</span>
            </p>
            <p class="text-sm font-medium text-gray-600 mt-1">
              <i class="fa-solid fa-building-shield mr-1.5"></i
              ><span id="profileUnit">소속 부대</span>
            </p>
          </div>
        </section>

        <section id="ddaySection" class="glass-card p-6 sm:p-8 hidden">
          <h3
            class="text-lg font-black text-gray-800 mb-6 flex items-center gap-2"
          >
            <i class="fa-solid fa-stopwatch text-indigo-500"></i> 복무 상태 및
            진급 정보
          </h3>

          <div
            class="bg-indigo-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden mb-6"
          >
            <div
              class="absolute right-0 top-0 w-32 h-32 bg-white opacity-10 rounded-full blur-xl translate-x-10 -translate-y-10"
            ></div>
            <p class="text-indigo-100 font-bold text-sm mb-1">
              전역까지 남은 시간
            </p>
            <div class="flex items-end justify-between mb-4">
              <h4
                class="text-4xl sm:text-5xl font-black tracking-tighter"
                id="dischargeDday"
              >
                D-0
              </h4>
              <span
                class="text-sm font-bold bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm"
                id="progressPercent"
                >0%</span
              >
            </div>
            <div
              class="w-full h-3 bg-indigo-900/50 rounded-full overflow-hidden shadow-inner"
            >
              <div
                id="progressBar"
                class="h-full bg-emerald-400 rounded-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(52,211,153,0.8)]"
                style="width: 0%"
              ></div>
            </div>
            <div
              class="flex justify-between text-xs text-indigo-200 mt-2 font-mono font-bold"
            >
              <span id="enlistDate">입대일: -</span>
              <span id="dischargeDate">전역일: -</span>
            </div>
          </div>

          <div
            class="bg-gray-50 border border-gray-100 rounded-xl p-5 flex items-center justify-between"
          >
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-xl text-yellow-500 shadow-sm border border-gray-100"
              >
                <i class="fa-solid fa-angles-up"></i>
              </div>
              <div>
                <p class="text-xs font-bold text-gray-500 mb-0.5">
                  다음 진급 목표
                </p>
                <p
                  class="text-lg font-black text-gray-800"
                  id="nextPromoTarget"
                >
                  계산 중...
                </p>
              </div>
            </div>
            <div class="text-right">
              <p class="text-xl font-black text-indigo-600" id="nextPromoDday">
                D-0
              </p>
            </div>
          </div>
        </section>

        <section class="glass-card p-6 sm:p-8">
          <h3
            class="text-lg font-black text-gray-800 mb-6 flex items-center gap-2"
          >
            <i class="fa-solid fa-shield-halved text-indigo-500"></i> 보안 설정
          </h3>
          <div class="space-y-4 max-w-md">
            <p
              class="text-xs font-bold text-red-500 bg-red-50 p-3 rounded-xl border border-red-100 mb-4 hidden"
              id="forceChangeWarning"
            >
              <i class="fa-solid fa-triangle-exclamation mr-1"></i>보안을 위해
              비밀번호를 반드시 변경해야 합니다!
            </p>
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-1.5"
                >현재 비밀번호</label
              >
              <input
                type="password"
                id="oldPassword"
                class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow"
                placeholder="현재 비밀번호를 입력하세요"
              />
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-1.5"
                >새 비밀번호</label
              >
              <input
                type="password"
                id="newPassword"
                class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow"
                placeholder="새로운 비밀번호 (6자리 이상)"
              />
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-1.5"
                >새 비밀번호 확인</label
              >
              <input
                type="password"
                id="confirmPassword"
                class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow"
                placeholder="새로운 비밀번호를 다시 입력하세요"
              />
            </div>
            <button
              onclick="changePassword()"
              class="mt-4 px-6 py-2.5 bg-gray-800 text-white font-bold rounded-xl shadow-md hover:bg-gray-900 transition-colors focus:ring-4 focus:ring-gray-200"
            >
              비밀번호 변경
            </button>
          </div>
        </section>
      </div>
    </main>

    <script>
      const roleMap = {
        soldier: "용사",
        officer: "간부",
        reviewer: "검토자",
        approver: "승인자",
      };

      function openSidebar() {
        document
          .getElementById("sidebar")
          ?.classList.remove("-translate-x-full");
        document
          .getElementById("sidebarOverlay")
          ?.classList.remove("hidden", "opacity-0");
        document.getElementById("sidebarOverlay")?.classList.add("opacity-100");
      }
      function closeSidebar() {
        document.getElementById("sidebar")?.classList.add("-translate-x-full");
        document
          .getElementById("sidebarOverlay")
          ?.classList.remove("opacity-100");
        document.getElementById("sidebarOverlay")?.classList.add("opacity-0");
        setTimeout(
          () =>
            document.getElementById("sidebarOverlay")?.classList.add("hidden"),
          300
        );
      }
      function logout() {
        if (confirm("로그아웃 하시겠습니까?")) {
          localStorage.removeItem("token");
          window.location.href = "login.html";
        }
      }

      function toggleNotifications() {
        document
          .getElementById("notificationDropdown")
          .classList.toggle("hidden");
      }
      document.addEventListener("click", function (event) {
        const dropdown = document.getElementById("notificationDropdown");
        const wrapper = document.getElementById("notificationWrapper");
        if (dropdown && !dropdown.classList.contains("hidden")) {
          if (
            !dropdown.contains(event.target) &&
            !wrapper.contains(event.target)
          )
            dropdown.classList.add("hidden");
        }
      });

      function formatDate(dateStr) {
        if (!dateStr) return "-";
        const d = new Date(dateStr);
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(
          2,
          "0"
        )}.${String(d.getDate()).padStart(2, "0")}`;
      }

      function calculateDdays(user) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        if (user.enlistmentDate && user.dischargeDate) {
          const enlist = new Date(user.enlistmentDate);
          const discharge = new Date(user.dischargeDate);

          document.getElementById(
            "enlistDate"
          ).innerText = `입대일: ${formatDate(enlist)}`;
          document.getElementById(
            "dischargeDate"
          ).innerText = `전역일: ${formatDate(discharge)}`;

          const totalDays = (discharge - enlist) / (1000 * 60 * 60 * 24);
          const servedDays = (today - enlist) / (1000 * 60 * 60 * 24);
          const remainDays = Math.ceil(
            (discharge - today) / (1000 * 60 * 60 * 24)
          );

          if (remainDays > 0) {
            document.getElementById(
              "dischargeDday"
            ).innerText = `D-${remainDays}`;
            let percent = Math.floor((servedDays / totalDays) * 100);
            if (percent < 0) percent = 0;
            document.getElementById(
              "progressPercent"
            ).innerText = `${percent}%`;
            setTimeout(() => {
              document.getElementById(
                "progressBar"
              ).style.width = `${percent}%`;
            }, 300);
          } else {
            document.getElementById("dischargeDday").innerText = "🎉 전역 완료";
            document.getElementById("progressPercent").innerText = "100%";
            document.getElementById("progressBar").style.width = "100%";
            document
              .getElementById("progressBar")
              .classList.replace("bg-emerald-400", "bg-yellow-400");
          }
        }

        const promoTargets = [
          { rank: "일병", date: user.promoToIlbyung },
          { rank: "상병", date: user.promoToSangbyung },
          { rank: "병장", date: user.promoToByungjang },
        ];

        let nextTarget = null;
        for (let target of promoTargets) {
          if (target.date && new Date(target.date) > today) {
            nextTarget = target;
            break;
          }
        }

        const nextPromoTargetEl = document.getElementById("nextPromoTarget");
        const nextPromoDdayEl = document.getElementById("nextPromoDday");

        if (nextTarget) {
          const remainPromo = Math.ceil(
            (new Date(nextTarget.date) - today) / (1000 * 60 * 60 * 24)
          );
          nextPromoTargetEl.innerText = `${nextTarget.rank} 진급 (${formatDate(
            nextTarget.date
          )})`;
          nextPromoDdayEl.innerText = `D-${remainPromo}`;
        } else {
          nextPromoTargetEl.innerText = "⭐ 최고 계급 도달";
          nextPromoTargetEl.classList.add("text-indigo-600");
          nextPromoDdayEl.innerText = "무사 전역 기원!";
          nextPromoDdayEl.classList.replace("text-xl", "text-sm");
        }
      }

      async function fetchUserInfoAndNotifications() {
        const token = localStorage.getItem("token");
        if (!token) {
          window.location.href = "login.html";
          return;
        }

        let userRoleObj = "soldier";
        try {
          const profileRes = await fetch("/profile", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const profileData = await profileRes.json();

          if (profileData.user) {
            const user = profileData.user;
            userRoleObj = user.role;
            const roleStr = roleMap[user.role] || user.role;
            const uName = user.name || "알 수 없음";

            document.getElementById(
              "user-profile-name"
            ).innerText = `${uName} (${roleStr})`;
            document.getElementById("headerProfileInitials").innerText =
              uName.charAt(0);

            if (
              ["reviewer", "approver", "officer", "superadmin"].includes(
                userRoleObj
              )
            ) {
              document
                .getElementById("manageTeamSidebarBtn")
                ?.style.setProperty("display", "flex", "important");
            }

            document.getElementById("profileName").innerText = user.name;
            document.getElementById("profileInitial").innerText =
              uName.charAt(0);
            document.getElementById("profileServiceNum").innerText =
              user.serviceNumber;
            document.getElementById("profileRank").innerText =
              user.rank || "계급없음";
            document.getElementById("profileRole").innerText = roleStr;
            document.getElementById("profileUnit").innerText =
              user.orgName || "소속 부대 없음";

            // 🔥 偵測到是被強制要求改密碼的狀態，顯示警告框！
            if (user.forceChangePassword) {
              document
                .getElementById("forceChangeWarning")
                .classList.remove("hidden");
            }

            if (user.role === "soldier") {
              document.getElementById("ddaySection").classList.remove("hidden");
              calculateDdays(user);
            }
          }
        } catch (err) {
          console.error("프로필 정보 로딩 실패", err);
        }

        try {
         // ✅ 正確的新代碼：
          const res = await fetch("/notifications", { headers: { Authorization: `Bearer ${token}` } });
          if (!res.ok) return;
          const data = await res.json();

          const badge = document.getElementById("notificationBadge");
          const list = document.getElementById("notificationList");
          const approveAllBtn = document.getElementById("approveAllBtn");
          const notifWrapper = document.getElementById("notificationWrapper");

          if (notifWrapper) notifWrapper.style.display = "flex";

          if (["reviewer", "approver", "superadmin"].includes(userRoleObj)) {
            const hasLeaves =
              data.notifications &&
              data.notifications.some(
                (n) =>
                  (n.status && n.status.includes("PENDING")) ||
                  (n.status && n.status.includes("CANCEL_REQ"))
              );
            if (approveAllBtn) {
              if (hasLeaves) approveAllBtn.classList.remove("hidden");
              else approveAllBtn.classList.add("hidden");
            }
          }

          if (data.notifications && data.notifications.length > 0) {
            badge.classList.remove("hidden");
            list.innerHTML = "";

            data.notifications.forEach((noti) => {
              let title,
                color,
                actionHtml,
                onClickAction,
                isDefaultCursor = false;

              if (noti.status === "NEW_MEMBER_PENDING") {
                title = "신규 부대원 가입 대기";
                color = "text-yellow-600";
                actionHtml = `<span class="text-[10px] bg-yellow-50 text-yellow-600 px-2 py-1 rounded font-bold shadow-sm hover:bg-yellow-500 hover:text-white transition-colors">심사하기</span>`;
                onClickAction = `window.location.href='adduser.html'`;
              } else if (noti.status === "DISCHARGE_TODAY") {
                title = "🎉 전역일 알림";
                color = "text-emerald-600";
                actionHtml = `<span class="text-[10px] bg-emerald-50 text-emerald-600 px-2 py-1 rounded font-bold shadow-sm hover:bg-emerald-500 hover:text-white transition-colors">전역 처리</span>`;
                onClickAction = `window.location.href='adduser.html'`;
              } else if (noti.status.includes("REJECTED")) {
                title = "휴가 신청 거절됨";
                color = "text-red-500";
                actionHtml = `<button onclick="confirmReject('${noti._id}', event)" class="px-3 py-1 bg-red-100 text-red-600 text-[10px] rounded font-bold hover:bg-red-200 transition">확인</button>`;
                onClickAction = "";
                isDefaultCursor = true;
              } else if (noti.status === "PASSWORD_RESET_REQ") {
                // 🔥 處理密碼重置通知
                title = "비밀번호 초기화 요청";
                color = "text-red-600";
                actionHtml = `<button onclick="approvePasswordReset('${noti._id}', event)" class="px-2 py-1 bg-red-50 text-red-600 text-[10px] rounded font-bold shadow-sm hover:bg-red-500 hover:text-white transition-colors">초기화 승인</button>`;
                onClickAction = ""; // 點擊不跳轉
                isDefaultCursor = true;
              } else {
                title = noti.status.includes("CANCEL")
                  ? "휴가 취소 결재 대기"
                  : "새로운 출타 심의 대기";
                color = noti.status.includes("CANCEL")
                  ? "text-orange-500"
                  : "text-indigo-600";
                if (
                  ["reviewer", "approver", "superadmin"].includes(userRoleObj)
                ) {
                  actionHtml = `
                      <div class="flex gap-1">
                        <button onclick="quickApprove('${noti._id}', '${noti.status}', event)" class="px-2 py-1 bg-indigo-50 text-indigo-600 text-[10px] rounded font-bold hover:bg-indigo-600 hover:text-white transition-colors shadow-sm">승인</button>
                        <button onclick="quickReject('${noti._id}', event)" class="px-2 py-1 bg-red-50 text-red-600 text-[10px] rounded font-bold hover:bg-red-600 hover:text-white transition-colors shadow-sm">반려</button>
                      </div>`;
                } else {
                  actionHtml = `<span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded font-bold">결재중</span>`;
                }
                onClickAction = `goToReviewApprove('${noti.status}', '${noti._id}')`;
              }

              list.innerHTML += `
                <div onclick="${onClickAction}" class="group p-3 border-b border-gray-100 hover:bg-gray-50 cursor-pointer flex justify-between items-center transition gap-3 ${
                isDefaultCursor ? "cursor-default" : ""
              }">
                  <div class="flex-1 overflow-hidden">
                    <p class="text-[13px] font-bold ${color} truncate mb-0.5">${title}</p>
                    <p class="text-[11px] text-gray-600 truncate">${
                      noti.userId?.name || "알 수 없음"
                    } - ${noti.reason || "사유 없음"}</p>
                  </div>
                  <div class="shrink-0 flex items-center">${actionHtml}</div>
                </div>`;
            });
          } else {
            badge.classList.add("hidden");
            if (approveAllBtn) approveAllBtn.classList.add("hidden");
            list.innerHTML = `<div class="p-5 text-center text-sm text-gray-400"><i class="fa-regular fa-bell-slash mb-2 text-xl block"></i>새로운 알림이 없습니다.</div>`;
          }
        } catch (err) {}
      }

      // 🔥 新增：核准密碼重置 API 呼叫
      async function approvePasswordReset(userId, event) {
        event.stopPropagation();
        if (!confirm("이 용사의 비밀번호를 군번으로 초기화하시겠습니까?"))
          return;
        try {
          const res = await fetch(`/auth/approve-reset/${userId}`, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          const data = await res.json();
          alert(data.message || data.error);
          if (data.success) fetchUserInfoAndNotifications(); // 重整小鈴鐺
        } catch (e) {
          alert("오류가 발생했습니다.");
        }
      }

      async function quickApprove(id, status, event) {
        event.stopPropagation();
        try {
          const endpoint = status.includes("REVIEW")
            ? `/leaves/${id}/review`
            : `/leaves/${id}/approve`;
          const res = await fetch(endpoint, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          if ((await res.json()).success) fetchUserInfoAndNotifications();
        } catch (e) {
          alert("오류가 발생했습니다.");
        }
      }

      async function quickReject(id, event) {
        event.stopPropagation();
        if (!confirm("반려하시겠습니까?")) return;
        try {
          const res = await fetch(`/leaves/${id}/reject`, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          if ((await res.json()).success) fetchUserInfoAndNotifications();
        } catch (e) {
          alert("오류가 발생했습니다.");
        }
      }

      async function approveAllLeaves() {
        if (!confirm("일괄 승인하시겠습니까?")) return;
        try {
          const res = await fetch(`/leaves/approve-all`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          if ((await res.json()).success) fetchUserInfoAndNotifications();
        } catch (e) {
          alert("오류가 발생했습니다.");
        }
      }

      function goToReviewApprove(status, id) {
        if (status.includes("REVIEW"))
          window.location.href = `review.html?id=${id}`;
        else window.location.href = `approve.html?id=${id}`;
      }

      // 變更密碼 API (區塊 C)
      async function changePassword() {
        const oldPassword = document.getElementById("oldPassword").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (!oldPassword || !newPassword || !confirmPassword)
          return alert("모든 칸을 입력해주세요.");
        if (newPassword.length < 6)
          return alert("새 비밀번호는 6자리 이상이어야 합니다.");
        if (newPassword !== confirmPassword)
          return alert("새 비밀번호가 일치하지 않습니다.");

        try {
          const token = localStorage.getItem("token");
          const res = await fetch("/profile/password", {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ oldPassword, newPassword }),
          });

          const data = await res.json();
          if (data.success) {
            alert(
              "비밀번호가 성공적으로 변경되었습니다.\n안전을 위해 다시 로그인해주세요."
            );
            localStorage.removeItem("token");
            window.location.href = "login.html";
          } else {
            alert(data.error || "비밀번호 변경 실패");
          }
        } catch (error) {
          alert("서버 통신 오류가 발생했습니다.");
        }
      }

      // 頁面載入時執行
      document.addEventListener("DOMContentLoaded", () => {
        fetchUserInfoAndNotifications();
        setInterval(fetchUserInfoAndNotifications, 60000);
      });
    </script>
  </body>
</html>
