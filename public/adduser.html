<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartMil - 부대원 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
      body {
        font-family: "Pretendard", sans-serif;
      }

      /* ✨ 프리미엄 배경 */
      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        background-color: #f8fafc;
      }
      .blob {
        position: absolute;
        filter: blur(90px);
        opacity: 0.65;
        animation: float 12s infinite alternate ease-in-out;
      }
      .blob-1 {
        top: -10%;
        left: -10%;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.3) 0%,
          rgba(99, 102, 241, 0) 70%
        );
      }
      .blob-2 {
        bottom: -20%;
        right: -10%;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(
          circle,
          rgba(168, 85, 247, 0.2) 0%,
          rgba(168, 85, 247, 0) 70%
        );
        animation-delay: -5s;
      }
      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(30px, 50px) scale(1.1);
        }
      }

      /* 🚀 핵심: Glass 컴포넌트 업그레이드 */
      #pendingList > div,
      #userList > div {
        background: rgba(255, 255, 255, 0.6) !important;
        backdrop-filter: blur(16px) !important;
        -webkit-backdrop-filter: blur(16px) !important;
        border: 1px solid rgba(255, 255, 255, 0.8) !important;
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05),
          inset 0 2px 10px rgba(255, 255, 255, 0.8) !important;
        border-radius: 1.5rem !important;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
        margin-bottom: 0.75rem !important;
        padding: 1rem 1.25rem !important;
      }
      #pendingList > div:hover,
      #userList > div:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 15px 35px -10px rgba(99, 102, 241, 0.15),
          inset 0 2px 10px rgba(255, 255, 255, 0.9) !important;
        border-color: rgba(99, 102, 241, 0.3) !important;
      }

      #userList select {
        background: rgba(255, 255, 255, 0.8) !important;
        border: 1px solid rgba(226, 232, 240, 1) !important;
        border-radius: 0.75rem !important;
        padding: 0.375rem 0.75rem !important;
        font-weight: 700 !important;
        color: #334155 !important;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05) !important;
        transition: all 0.2s !important;
      }
      #userList select:hover {
        border-color: #818cf8 !important;
      }

      #userList span[class*="bg-"] {
        border-radius: 0.5rem !important;
        padding: 0.25rem 0.75rem !important;
        font-weight: 800 !important;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02) !important;
      }

      #pendingList .rounded-full,
      #userList .rounded-full {
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05),
          inset 0 2px 4px rgba(255, 255, 255, 0.5) !important;
      }

      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .glass-input {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        transition: all 0.3s ease;
      }
      .glass-input:focus {
        background: rgba(255, 255, 255, 0.9);
        border-color: #818cf8;
        box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.2),
          inset 0 2px 4px rgba(0, 0, 0, 0.02);
        outline: none;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-slate-800 min-h-screen flex flex-col relative selection:bg-indigo-500 selection:text-white pb-20"
  >
    <div class="mesh-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div
      id="sidebarOverlay"
      onclick="closeSidebar()"
      class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity duration-300 opacity-0"
    ></div>
    <aside
      id="sidebar"
      class="fixed top-0 left-0 h-full w-64 bg-white z-50 shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col"
    >
      <div
        class="p-6 border-b border-gray-100 flex justify-between items-center bg-indigo-50"
      >
        <h2
          class="text-xl font-bold text-indigo-700 leading-none tracking-tight"
        >
          SmartMil
        </h2>
        <button
          onclick="closeSidebar()"
          class="text-gray-500 hover:text-gray-800 transition"
        >
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <a
          href="index.html"
          class="flex items-center gap-3 p-3 rounded-lg hover:bg-indigo-50 text-gray-700 hover:text-indigo-700 transition group"
        >
          <i
            class="fa-solid fa-calendar-days text-lg text-gray-400 group-hover:text-indigo-600"
          ></i>
          <span class="font-medium">홈 (달력)</span>
        </a>
        <a
          href="adduser.html"
          class="flex items-center gap-3 p-3 rounded-lg bg-indigo-50 text-indigo-700 transition group"
        >
          <i class="fa-solid fa-users text-lg text-indigo-600"></i>
          <span class="font-bold">부대원 관리</span>
        </a>
      </nav>
      <div class="p-4 border-t border-gray-100">
        <button
          onclick="logout()"
          class="w-full flex items-center gap-3 p-3 rounded-lg text-red-500 hover:bg-red-50 transition font-medium"
        >
          <i class="fa-solid fa-right-from-bracket"></i> 로그아웃
        </button>
      </div>
    </aside>

    <header
      class="bg-white/75 backdrop-blur-2xl border-b border-gray-100 px-4 sm:px-6 py-3 flex items-center justify-between relative z-30 transition-all"
    >
      <div class="flex items-center gap-3">
        <button
          onclick="openSidebar()"
          class="text-gray-500 hover:text-gray-800 transition p-2 rounded-full hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500/20"
        >
          <i class="fa-solid fa-bars text-lg"></i>
        </button>
        <h1
          onclick="window.location.href='index.html'"
          class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 tracking-tighter cursor-pointer"
        >
          SmartMil
        </h1>
      </div>

      <div class="flex items-center gap-1 sm:gap-2">
        <div class="relative group hidden sm:flex items-center mr-1 sm:mr-3">
          <input
            type="text"
            placeholder="검색..."
            class="w-9 h-9 rounded-full bg-gray-100/80 border border-transparent focus:w-40 sm:focus:w-56 focus:bg-white focus:border-gray-200 focus:shadow-[0_4px_20px_-5px_rgba(0,0,0,0.1)] focus:px-4 focus:pl-10 transition-all duration-500 outline-none text-sm placeholder-transparent focus:placeholder-gray-400 cursor-pointer focus:cursor-text peer text-gray-700"
          />
          <i
            class="fa-solid fa-magnifying-glass absolute left-2.5 text-gray-500 peer-focus:text-indigo-500 transition-colors duration-300 pointer-events-none"
          ></i>
        </div>

        <span
          id="user-profile-name"
          class="text-sm font-bold text-gray-700 hidden sm:block mr-2"
        ></span>

        <div class="relative flex items-center">
          <button
            id="notificationWrapper"
            onclick="toggleNotifications()"
            class="w-9 h-9 relative flex items-center justify-center text-gray-600 hover:text-indigo-600 hover:bg-gray-100 rounded-full transition-all focus:outline-none"
            title="알림"
          >
            <i class="fa-regular fa-bell text-lg"></i>
            <span
              id="notificationBadge"
              class="hidden absolute top-2 right-2.5 w-2 h-2 bg-red-500 rounded-full border border-white"
            ></span>
          </button>
          <div
            id="notificationDropdown"
            class="hidden absolute top-12 right-0 w-80 sm:w-96 bg-white shadow-[0_10px_40px_rgba(0,0,0,0.1)] rounded-xl border border-gray-100 z-50 flex flex-col max-h-96 overflow-hidden transition-all transform origin-top-right"
          >
            <div
              class="p-3 border-b border-gray-100 bg-gray-50/80 backdrop-blur-sm font-bold text-gray-800 text-sm flex justify-between items-center"
            >
              <span
                ><i class="fa-solid fa-bell text-indigo-500 mr-1.5"></i>알림
                내역</span
              >
              <button
                onclick="toggleNotifications()"
                class="text-gray-400 hover:text-gray-600"
              >
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div
              id="notificationList"
              class="flex flex-col overflow-y-auto custom-scrollbar bg-white"
            ></div>
          </div>
        </div>

        <button
          class="w-9 h-9 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 text-white flex items-center justify-center font-bold shadow-sm ml-1 focus:outline-none"
        >
          <span class="text-xs" id="headerProfileInitials">SM</span>
        </button>
        <div class="hidden sm:block w-px h-5 bg-gray-200 mx-1"></div>
        <button
          onclick="logout()"
          class="w-9 h-9 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-all focus:outline-none"
        >
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
      </div>
    </header>

    <main
      class="flex-1 max-w-5xl mx-auto w-full pt-10 px-4 sm:px-6 relative z-10"
    >
      <div
        class="flex flex-col sm:flex-row justify-between items-end gap-5 mb-10"
      >
        <div>
          <h2
            id="unitTitleDisplay"
            class="text-3xl sm:text-4xl font-black text-gray-900 tracking-tight mb-2"
          >
            소속 부대 <span class="text-indigo-600 font-light">조직도</span>
          </h2>
          <p class="text-gray-500 font-medium">
            조직원의 권한을 설정하고 가입 요청을 승인합니다.
          </p>
        </div>
        <div class="relative w-full sm:w-80">
          <input
            type="text"
            id="searchUser"
            placeholder="이름, 군번으로 검색..."
            class="glass-input w-full h-11 pl-10 pr-4 rounded-xl text-sm font-medium text-gray-800 placeholder-gray-400"
          />
          <i
            class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
        </div>
      </div>

      <section id="pendingSection" class="mb-12 hidden">
        <div class="flex items-center gap-3 mb-4 pl-2">
          <div
            class="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse shadow-[0_0_12px_rgba(250,204,21,0.8)]"
          ></div>
          <h3 class="text-lg font-bold text-gray-800 tracking-tight">
            가입 승인 대기
            <span
              id="pendingCount"
              class="ml-1.5 px-2 py-0.5 rounded-md bg-yellow-100 text-yellow-700 text-sm font-black shadow-sm border border-yellow-200/50"
              >0</span
            >
          </h3>
        </div>
        <div id="pendingList" class="space-y-0"></div>
      </section>

      <section>
        <div class="flex items-center gap-3 mb-4 pl-2">
          <div
            class="w-8 h-8 rounded-full bg-indigo-100/80 text-indigo-600 flex items-center justify-center shadow-sm border border-indigo-200/50"
          >
            <i class="fa-solid fa-users text-sm"></i>
          </div>
          <h3 class="text-lg font-bold text-gray-800 tracking-tight">
            소속 부대원
            <span
              id="activeCount"
              class="ml-1.5 px-2 py-0.5 rounded-md bg-indigo-100 text-indigo-700 text-sm font-black shadow-sm border border-indigo-200/50"
              >0</span
            >
          </h3>
        </div>
        <div id="userList" class="space-y-0"></div>
      </section>
    </main>

    <script src="./js/adduser.js"></script>
    <script>
      const roleMap = {
        soldier: "용사",
        officer: "간부",
        reviewer: "검토자",
        approver: "승인자",
      };

      function toggleNotifications() {
        document
          .getElementById("notificationDropdown")
          .classList.toggle("hidden");
      }

      async function fetchUserInfoAndNotifications() {
        const token = localStorage.getItem("token");
        if (!token) return;

        try {
          const res = await fetch("/leaves/notifications", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();

          if (data.userInfo) {
            const roleStr = roleMap[data.userInfo.role] || data.userInfo.role;
            document.getElementById(
              "user-profile-name"
            ).innerText = `${data.userInfo.name}(${roleStr})`;

            const unitName = data.userInfo.unitName;
            if (unitName && unitName !== "소속 부대") {
              document.getElementById(
                "unitTitleDisplay"
              ).innerHTML = `${unitName} <span class="text-indigo-600 font-light">조직도</span>`;
            }
          }

          const badge = document.getElementById("notificationBadge");
          const list = document.getElementById("notificationList");
          if (data.notifications && data.notifications.length > 0) {
            badge.classList.remove("hidden");
            list.innerHTML = "";
            data.notifications.forEach((noti) => {
              const isReject = noti.status.includes("REJECTED");
              const title = isReject
                ? "휴가 신청 거절됨"
                : "새로운 출타 심의 대기";
              const color = isReject ? "text-red-500" : "text-indigo-600";

              // 🔥 UI 변경: ">" 화살표 대신 깔끔한 [상세보기] 배지 사용
              const actionHtml = isReject
                ? `<button onclick="confirmReject('${noti._id}', event)" class="px-3 py-1 bg-red-100 text-red-600 text-xs rounded font-bold hover:bg-red-200 transition">확인</button>`
                : `<span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded font-bold shadow-sm group-hover:bg-indigo-600 group-hover:text-white transition-colors">상세보기</span>`;

              list.innerHTML += `
                <div onclick="${
                  isReject
                    ? ""
                    : `goToReviewApprove('${noti.status}', '${noti._id}')`
                }" class="group p-3 border-b border-gray-100 hover:bg-gray-50 cursor-pointer flex justify-between items-center transition gap-3 ${
                isReject ? "cursor-default" : ""
              }">
                  <div class="flex-1 overflow-hidden">
                    <p class="text-[13px] font-bold ${color} truncate mb-0.5">${title}</p>
                    <p class="text-[11px] text-gray-600 truncate">${
                      noti.userId?.name || "알 수 없음"
                    } - ${noti.reason || "사유 없음"}</p>
                  </div>
                  <div class="shrink-0 flex items-center">${actionHtml}</div>
                </div>`;
            });
          } else {
            badge.classList.add("hidden");
            list.innerHTML = `<div class="p-5 text-center text-sm text-gray-400"><i class="fa-regular fa-bell-slash mb-2 text-xl block"></i>새로운 알림이 없습니다.</div>`;
          }
        } catch (err) {}
      }

      function goToReviewApprove(status, id) {
        if (status === "PENDING_REVIEW")
          window.location.href = `review.html?id=${id}`;
        else if (status === "PENDING_APPROVAL")
          window.location.href = `approve.html?id=${id}`;
      }

      async function confirmReject(id, event) {
        event.stopPropagation();
        try {
          await fetch(`/leaves/${id}/confirm-reject`, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          fetchUserInfoAndNotifications();
        } catch (e) {}
      }

      document.addEventListener(
        "DOMContentLoaded",
        fetchUserInfoAndNotifications
      );

      document.addEventListener("click", function (event) {
        const dropdown = document.getElementById("notificationDropdown");
        const wrapper = document.getElementById("notificationWrapper");
        if (dropdown && !dropdown.classList.contains("hidden")) {
          if (
            !dropdown.contains(event.target) &&
            !wrapper.contains(event.target)
          ) {
            dropdown.classList.add("hidden");
          }
        }
      });

      function openSidebar() {
        document
          .getElementById("sidebar")
          ?.classList.remove("-translate-x-full");
        document
          .getElementById("sidebarOverlay")
          ?.classList.remove("hidden", "opacity-0");
        document.getElementById("sidebarOverlay")?.classList.add("opacity-100");
      }
      function closeSidebar() {
        document.getElementById("sidebar")?.classList.add("-translate-x-full");
        document
          .getElementById("sidebarOverlay")
          ?.classList.remove("opacity-100");
        document.getElementById("sidebarOverlay")?.classList.add("opacity-0");
        setTimeout(
          () =>
            document.getElementById("sidebarOverlay")?.classList.add("hidden"),
          300
        );
      }
      function logout() {
        if (confirm("로그아웃 하시겠습니까?")) {
          localStorage.removeItem("token");
          window.location.href = "login.html";
        }
      }
    </script>
  </body>
</html>
