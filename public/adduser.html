<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartMil - 부대원 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
      body {
        font-family: "Pretendard", sans-serif;
      }

      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        background-color: #f8fafc;
      }
      .blob {
        position: absolute;
        filter: blur(90px);
        opacity: 0.65;
        animation: float 12s infinite alternate ease-in-out;
      }
      .blob-1 {
        top: -10%;
        left: -10%;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.3) 0%,
          rgba(99, 102, 241, 0) 70%
        );
      }
      .blob-2 {
        bottom: -20%;
        right: -10%;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(
          circle,
          rgba(168, 85, 247, 0.2) 0%,
          rgba(168, 85, 247, 0) 70%
        );
        animation-delay: -5s;
      }
      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(30px, 50px) scale(1.1);
        }
      }

      #pendingList > div,
      #userList > div {
        background: rgba(255, 255, 255, 0.6) !important;
        backdrop-filter: blur(16px) !important;
        border: 1px solid rgba(255, 255, 255, 0.8) !important;
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05),
          inset 0 2px 10px rgba(255, 255, 255, 0.8) !important;
        border-radius: 1.5rem !important;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
        margin-bottom: 0.75rem !important;
        padding: 1rem 1.25rem !important;
      }
      #pendingList > div:hover,
      #userList > div:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 15px 35px -10px rgba(99, 102, 241, 0.15),
          inset 0 2px 10px rgba(255, 255, 255, 0.9) !important;
        border-color: rgba(99, 102, 241, 0.3) !important;
      }
      #userList select {
        background: rgba(255, 255, 255, 0.8) !important;
        border: 1px solid rgba(226, 232, 240, 1) !important;
        border-radius: 0.75rem !important;
        padding: 0.375rem 0.75rem !important;
        font-weight: 700 !important;
        color: #334155 !important;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05) !important;
        transition: all 0.2s !important;
      }
      #userList select:hover {
        border-color: #818cf8 !important;
      }
      #userList span[class*="bg-"] {
        border-radius: 0.5rem !important;
        padding: 0.25rem 0.75rem !important;
        font-weight: 800 !important;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02) !important;
      }
      #pendingList .rounded-full,
      #userList .rounded-full {
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05),
          inset 0 2px 4px rgba(255, 255, 255, 0.5) !important;
      }

      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .glass-input {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        transition: all 0.3s ease;
      }
      .glass-input:focus {
        background: rgba(255, 255, 255, 0.9);
        border-color: #818cf8;
        box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.2),
          inset 0 2px 4px rgba(0, 0, 0, 0.02);
        outline: none;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }

      @keyframes modalPop {
        0% {
          opacity: 0;
          transform: scale(0.95) translateY(10px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .modal-animate {
        animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
  </head>

    <input type="hidden" id="currentHrUserId" value="" />

    <script src="./js/adduser.js"></script>

    <script>
      const roleMap = {
        soldier: "용사",
        officer: "간부",
        reviewer: "검토자",
        approver: "승인자",
      };

      function toggleNotifications() {
        document
          .getElementById("notificationDropdown")
          .classList.toggle("hidden");
      }

      // 🔥 [스마트 알림 동기화] 최신 알림 및 프로필 호출 기능
      async function fetchUserInfoAndNotifications() {
        const token = localStorage.getItem("token");
        if (!token) return;

        let userRoleObj = "soldier";
        try {
          const profileRes = await fetch("/profile", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const profileData = await profileRes.json();
          if (profileData.user) {
            userRoleObj = profileData.user.role;
            const roleStr = roleMap[userRoleObj] || userRoleObj;
            const uName = profileData.user.name || "알 수 없음";
            document.getElementById(
              "user-profile-name"
            ).innerText = `${uName} (${roleStr})`;
            document.getElementById("headerProfileInitials").innerText =
              uName.charAt(0);
            if (profileData.user.orgName) {
              document.getElementById(
                "unitTitleDisplay"
              ).innerHTML = `${profileData.user.orgName} <span class="text-indigo-600 font-light">조직도</span>`;
            }
          }
        } catch (err) {
          console.error("이름 정보 로딩 실패", err);
        }

        try {
          // ✅ 正確的新代碼：
          const res = await fetch("/notifications", { headers: { Authorization: `Bearer ${token}` } });
          if (!res.ok) return;
          const data = await res.json();

          const badge = document.getElementById("notificationBadge");
          const list = document.getElementById("notificationList");
          const approveAllBtn = document.getElementById("approveAllBtn");

          if (["reviewer", "approver", "superadmin"].includes(userRoleObj)) {
            const hasLeaves =
              data.notifications &&
              data.notifications.some(
                (n) =>
                  (n.status && n.status.includes("PENDING")) ||
                  (n.status && n.status.includes("CANCEL_REQ"))
              );
            if (approveAllBtn) {
              if (hasLeaves) approveAllBtn.classList.remove("hidden");
              else approveAllBtn.classList.add("hidden");
            }
          }

          if (data.notifications && data.notifications.length > 0) {
            badge.classList.remove("hidden");
            list.innerHTML = "";

            data.notifications.forEach((noti) => {
              let title,
                color,
                actionHtml,
                onClickAction,
                isDefaultCursor = false;

              if (noti.status === "NEW_MEMBER_PENDING") {
                title = "신규 부대원 가입 대기";
                color = "text-yellow-600";
                actionHtml = `<span class="text-[10px] bg-yellow-50 text-yellow-600 px-2 py-1 rounded font-bold shadow-sm hover:bg-yellow-500 hover:text-white transition-colors">심사하기</span>`;
                onClickAction = `window.location.href='adduser.html'`;
              } else if (noti.status === "DISCHARGE_TODAY") {
                title = "🎉 전역일 알림";
                color = "text-emerald-600";
                actionHtml = `<span class="text-[10px] bg-emerald-50 text-emerald-600 px-2 py-1 rounded font-bold shadow-sm hover:bg-emerald-500 hover:text-white transition-colors">전역 처리</span>`;
                onClickAction = `window.location.href='adduser.html'`;
              } else if (noti.status.includes("REJECTED")) {
                title = "휴가 신청 거절됨";
                color = "text-red-500";
                actionHtml = `<button onclick="confirmReject('${noti._id}', event)" class="px-3 py-1 bg-red-100 text-red-600 text-[10px] rounded font-bold hover:bg-red-200 transition">확인</button>`;
                onClickAction = "";
                isDefaultCursor = true;
              } else if (noti.status === "PASSWORD_RESET_REQ") {
                // 🔥 비밀번호 초기화 승인 로직 연결
                title = "비밀번호 초기화 요청";
                color = "text-red-600";
                actionHtml = `<button onclick="approvePasswordReset('${noti._id}', event)" class="px-2 py-1 bg-red-50 text-red-600 text-[10px] rounded font-bold shadow-sm hover:bg-red-500 hover:text-white transition-colors">초기화 승인</button>`;
                onClickAction = "";
                isDefaultCursor = true;
              } else {
                title = noti.status.includes("CANCEL")
                  ? "휴가 취소 결재 대기"
                  : "새로운 출타 심의 대기";
                color = noti.status.includes("CANCEL")
                  ? "text-orange-500"
                  : "text-indigo-600";
                if (
                  ["reviewer", "approver", "superadmin"].includes(userRoleObj)
                ) {
                  actionHtml = `
                      <div class="flex gap-1">
                        <button onclick="quickApprove('${noti._id}', '${noti.status}', event)" class="px-2 py-1 bg-indigo-50 text-indigo-600 text-[10px] rounded font-bold hover:bg-indigo-600 hover:text-white transition-colors shadow-sm">승인</button>
                        <button onclick="quickReject('${noti._id}', event)" class="px-2 py-1 bg-red-50 text-red-600 text-[10px] rounded font-bold hover:bg-red-600 hover:text-white transition-colors shadow-sm">반려</button>
                      </div>`;
                } else {
                  actionHtml = `<span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded font-bold">결재중</span>`;
                }
                onClickAction = `goToReviewApprove('${noti.status}', '${noti._id}')`;
              }

              list.innerHTML += `
                <div onclick="${onClickAction}" class="group p-3 border-b border-gray-100 hover:bg-gray-50 cursor-pointer flex justify-between items-center transition gap-3 ${
                isDefaultCursor ? "cursor-default" : ""
              }">
                  <div class="flex-1 overflow-hidden">
                    <p class="text-[13px] font-bold ${color} truncate mb-0.5">${title}</p>
                    <p class="text-[11px] text-gray-600 truncate">${
                      noti.userId?.name || "알 수 없음"
                    } - ${noti.reason || "사유 없음"}</p>
                  </div>
                  <div class="shrink-0 flex items-center">${actionHtml}</div>
                </div>`;
            });
          } else {
            badge.classList.add("hidden");
            if (approveAllBtn) approveAllBtn.classList.add("hidden");
            list.innerHTML = `<div class="p-5 text-center text-sm text-gray-400"><i class="fa-regular fa-bell-slash mb-2 text-xl block"></i>새로운 알림이 없습니다.</div>`;
          }
        } catch (err) {}
      }

      // 비밀번호 초기화 승인 함수
      async function approvePasswordReset(userId, event) {
        event.stopPropagation();
        if (!confirm("이 용사의 비밀번호를 군번으로 초기화하시겠습니까?"))
          return;
        try {
          const res = await fetch(`/auth/approve-reset/${userId}`, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          const data = await res.json();
          alert(data.message || data.error);
          if (data.success) fetchUserInfoAndNotifications(); // 성공 시 종모양 즉시 업데이트
        } catch (e) {
          alert("오류가 발생했습니다.");
        }
      }

      async function quickApprove(id, status, event) {
        event.stopPropagation();
        try {
          const endpoint = status.includes("REVIEW")
            ? `/leaves/${id}/review`
            : `/leaves/${id}/approve`;
          const res = await fetch(endpoint, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          if ((await res.json()).success) fetchUserInfoAndNotifications();
        } catch (e) {
          alert("오류가 발생했습니다.");
        }
      }

      async function quickReject(id, event) {
        event.stopPropagation();
        if (!confirm("반려하시겠습니까?")) return;
        try {
          const res = await fetch(`/leaves/${id}/reject`, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          if ((await res.json()).success) fetchUserInfoAndNotifications();
        } catch (e) {
          alert("오류가 발생했습니다.");
        }
      }

      async function approveAllLeaves() {
        if (!confirm("일괄 승인하시겠습니까?")) return;
        try {
          const res = await fetch(`/leaves/approve-all`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          const data = await res.json();
          if (data.success) {
            alert(data.message);
            fetchUserInfoAndNotifications();
          } else alert(data.error || "오류가 발생했습니다.");
        } catch (e) {
          alert("일괄 승인 중 오류가 발생했습니다.");
        }
      }

      function goToReviewApprove(status, id) {
        if (status === "PENDING_REVIEW" || status === "CANCEL_REQ_REVIEW")
          window.location.href = `review.html?id=${id}`;
        else if (
          status === "PENDING_APPROVAL" ||
          status === "CANCEL_REQ_APPROVAL"
        )
          window.location.href = `approve.html?id=${id}`;
      }

      async function confirmReject(id, event) {
        event.stopPropagation();
        try {
          await fetch(`/leaves/${id}/confirm-reject`, {
            method: "PUT",
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          fetchUserInfoAndNotifications();
        } catch (e) {}
      }

      document.addEventListener(
        "DOMContentLoaded",
        fetchUserInfoAndNotifications
      );
      document.addEventListener("click", function (event) {
        const dropdown = document.getElementById("notificationDropdown");
        const wrapper = document.getElementById("notificationWrapper");
        if (dropdown && !dropdown.classList.contains("hidden")) {
          if (
            !dropdown.contains(event.target) &&
            !wrapper.contains(event.target)
          )
            dropdown.classList.add("hidden");
        }
      });

      function openSidebar() {
        document
          .getElementById("sidebar")
          ?.classList.remove("-translate-x-full");
        document
          .getElementById("sidebarOverlay")
          ?.classList.remove("hidden", "opacity-0");
        document.getElementById("sidebarOverlay")?.classList.add("opacity-100");
      }
      function closeSidebar() {
        document.getElementById("sidebar")?.classList.add("-translate-x-full");
        document
          .getElementById("sidebarOverlay")
          ?.classList.remove("opacity-100");
        document.getElementById("sidebarOverlay")?.classList.add("opacity-0");
        setTimeout(
          () =>
            document.getElementById("sidebarOverlay")?.classList.add("hidden"),
          300
        );
      }
      function logout() {
        if (confirm("로그아웃 하시겠습니까?")) {
          localStorage.removeItem("token");
          window.location.href = "login.html";
        }
      }
      function closeHrModal() {
        document.getElementById("hrModal").classList.add("hidden");
      }

      // ==========================================
      // 🔥 타 페이지 전용: 전역 검색 엔진 (클릭 시 홈으로 이동하여 스포트라이트 실행)
      // ==========================================
      let globalSearchCache = null;

      async function initGlobalSearchData() {
        if(globalSearchCache) return;
        const currentToken = localStorage.getItem("token");
        const currentUserRole = localStorage.getItem("role") || "soldier";
        const endpoint = ["reviewer", "officer", "approver", "superadmin"].includes(currentUserRole) ? "/leaves/all" : "/leaves/my";
        try {
          const res = await fetch(endpoint, { headers: { Authorization: `Bearer ${currentToken}` } });
          const data = await res.json();
          globalSearchCache = data.leaves || [];
        } catch(e) {}
      }

      function handleGlobalSearch(query) {
        query = query.trim().toLowerCase();
        const dropdown = document.getElementById("globalSearchDropdown");
        if (!query) { dropdown.classList.add("hidden"); return; }
        if (!globalSearchCache) return;

        const results = globalSearchCache.filter(l => {
          if (l.status.includes("CANCELLED") || l.status.includes("REJECTED")) return false; 
          const searchStr = `${l.userId?.name || ""} ${l.userId?.rank || ""} ${l.reason || ""} ${l.type || ""}`.toLowerCase();
          return searchStr.includes(query);
        });

        const list = document.getElementById("globalSearchList");
        dropdown.classList.remove("hidden");
        
        if (results.length === 0) {
          list.innerHTML = `<div class="p-5 text-sm text-gray-400 text-center"><i class="fa-solid fa-magnifying-glass-minus block text-2xl mb-2"></i>검색 결과가 없습니다.</div>`;
          return;
        }

        list.innerHTML = results.map(l => {
          const sDate = l.startDate.split("T")[0];
          const eDate = l.endDate.split("T")[0];
          let statusBadge = l.isWaitlisted ? `<span class="bg-orange-100 text-orange-600 border border-orange-200 px-1.5 py-0.5 rounded text-[10px] font-bold tracking-tight">후보</span>` : `<span class="bg-blue-100 text-blue-600 border border-blue-200 px-1.5 py-0.5 rounded text-[10px] font-bold tracking-tight">정규</span>`;
          
          // 🔥 點擊時，附帶 URL 參數導向 index.html
          return `
          <div onclick="window.location.href='index.html?focus=${l._id}&type=${l.type}&date=${sDate}'" class="p-3 hover:bg-indigo-50 border-b border-gray-50 cursor-pointer transition flex flex-col gap-1">
              <div class="flex justify-between items-center">
                  <span class="font-bold text-[13px] text-gray-800">[${l.type}] ${l.userId?.name || "알수없음"} <span class="text-[11px] text-gray-500 font-normal">(${l.userId?.rank || ""})</span></span>
                  ${statusBadge}
              </div>
              <div class="text-[11px] text-gray-500 truncate"><i class="fa-regular fa-calendar mr-1"></i>${sDate.replace(/-/g, ".")} ~ ${eDate.replace(/-/g, ".")} | ${l.reason}</div>
          </div>`;
        }).join("");
      }

      document.addEventListener("click", (e) => {
        const dropdown = document.getElementById("globalSearchDropdown");
        const input = document.getElementById("globalSearchInput");
        if (dropdown && !dropdown.classList.contains("hidden")) {
          if (!dropdown.contains(e.target) && e.target !== input) dropdown.classList.add("hidden");
        }
      });
    </script>
  </body>
</html>
