<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>비밀번호 찾기 - Military Service</title>
  </head>
  <body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-gray-800">비밀번호 찾기</h2>
        <p class="text-gray-500 mt-2 text-sm">
          군번과 이름을 입력하시면 관리자에게 <br />비밀번호 초기화 요청이
          전달됩니다.
        </p>
      </div>

      <form id="resetRequestForm" class="space-y-4">
        <div>
          <label
            for="serviceNumber"
            class="block text-sm font-medium text-gray-700 mb-1"
            >군번</label
          >
          <input
            type="text"
            id="serviceNumber"
            name="serviceNumber"
            placeholder="XX-XXXXXXXX"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none transition"
          />
        </div>
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1"
            >이름</label
          >
          <input
            type="text"
            id="name"
            name="name"
            placeholder="성명을 입력하세요"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none transition"
          />
        </div>

        <button
          type="submit"
          id="sendBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md transition duration-200 transform hover:scale-[1.02] active:scale-95"
        >
          초기화 요청 보내기
        </button>
      </form>

      <div id="message" class="mt-4 text-sm text-center min-h-[1.25rem]"></div>

      <div class="pt-4 mt-4 border-t border-gray-200 text-center">
        <a
          href="/login.html"
          class="text-indigo-600 hover:text-indigo-800 text-sm font-medium transition"
        >
          ← 로그인 페이지로 돌아가기
        </a>
      </div>
    </div>

    <script src="./js/forgot-password.js"></script>
  </body>
</html>
